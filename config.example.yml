db:
  type: postgres      # postgres | mysql | mariadb | sqlite | duckdb | doris
  host: localhost
  port: 5432
  dbname: mydb
  user: alice
  password: secret

serve:
  host: 0.0.0.0
  port: 8080

# Optional — override enrichment limits (see docs/configuration.md for defaults)
enrichment:
  # budget: 20
  # distinct_values_limit: 50
  # distinct_values_max_cardinality: 500

# Optional — remove this block if you don't use OpenTelemetry
monitoring:
  service_name: dbt-graphql   # OTel service.name resource attribute

  logs:
    level: info               # trace | debug | info | warning | error | critical
    # endpoint: http://localhost:4317   # uncomment to ship logs over OTLP
    # protocol: grpc                    # grpc | http  (required when endpoint is set)

  traces:
    # endpoint: http://localhost:4317   # uncomment to export spans over OTLP
    # protocol: grpc                    # grpc | http  (required when endpoint is set)

  metrics:
    # endpoint: http://localhost:4317   # uncomment to export metrics over OTLP
    # protocol: grpc                    # grpc | http  (required when endpoint is set)
