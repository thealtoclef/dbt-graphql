# dbt-graphql configuration — copy to `config.yml` and edit.
#
# Usage:
#   dbt-graphql --config config.yml            # serve mode
#   dbt-graphql --config config.yml --output . # generate mode (write db.graphql + lineage.json)
#
# Any field can be overridden by a `DBT_GRAPHQL__*` env var (nested fields use
# `__` as delimiter, e.g. `DBT_GRAPHQL__DB__PASSWORD=secret`). Env vars take
# precedence over values in this file.
#
# Default values for optional fields are defined as constants in
# `src/dbt_graphql/defaults.py`.

# -----------------------------------------------------------------------------
# dev_mode (optional, default false) — single profile switch.
#
# `dev_mode: true` bypasses authn/authz (every request is anonymous, no
#   policy evaluation) and enables GraphQL introspection. Local development
#   only.
#
# `dev_mode: false` (default) — secure-by-default. `security.jwt` must be
#   fully configured below or the server fails to start, and introspection
#   is off.
# -----------------------------------------------------------------------------
dev_mode: true   # this example is dev-friendly; set to false (or remove) in prod

# -----------------------------------------------------------------------------
# dbt (required) — paths to dbt artifacts
# -----------------------------------------------------------------------------
dbt:
  catalog: target/catalog.json    # relative to this file, or absolute
  manifest: target/manifest.json
  # exclude:                      # regex patterns to skip models (OR logic)
  #   - '^stg_'
  #   - '^int_'

# -----------------------------------------------------------------------------
# db (required for serve mode) — database connection
# -----------------------------------------------------------------------------
db:
  type: postgres            # postgres | mysql | mariadb | doris
  host: localhost
  port: 5432
  dbname: analytics
  user: dbt
  password: ""              # prefer DBT_GRAPHQL__DB__PASSWORD env var

# -----------------------------------------------------------------------------
# serve (required for serve mode) — HTTP server bind config.
#
# GraphQL is always mounted at /graphql when serving (see ``--output``-less
# CLI invocation). MCP is opt-in via ``mcp_enabled`` and mounts at /mcp.
# Both transports share the same Granian process, the same JWT auth
# middleware, and the same access policy — so a caller authorized for
# GraphQL is authorized for MCP, and policy filtering applies uniformly.
# -----------------------------------------------------------------------------
serve:
  host: 0.0.0.0
  port: 9876
  mcp_enabled: false             # opt-in; expose schema discovery + run_graphql to LLM agents

# -----------------------------------------------------------------------------
# graphql (optional) — query guard limits applied to all incoming GraphQL
# operations (both HTTP /graphql and MCP run_graphql). These protect against
# LLM-issued queries that are deeply nested or select too many fields.
# -----------------------------------------------------------------------------
# graphql:
#   query_max_depth: 5      # max selection-set nesting depth (depth of deepest leaf; e.g. { customers { orders { id } } } is depth 3)
#   query_max_fields: 50    # max total leaf fields across the whole query
#   query_max_limit: 1000   # cap on `limit:` / `first:` integer literals (analytics-cost axis); set null to disable

# -----------------------------------------------------------------------------
# monitoring (optional) — OpenTelemetry + log level. Each signal block is
# independent: omit `endpoint` to keep that signal local-only.
# -----------------------------------------------------------------------------
# monitoring:
#   service_name: dbt-graphql               # OTel resource attribute
#   logs:
#     level: INFO                           # trace | debug | info | warning | error | critical
#     # endpoint: http://otel-collector:4318/v1/logs
#     # protocol: http                      # http | grpc — required when endpoint is set
#   traces:
#     # endpoint: http://otel-collector:4318/v1/traces
#     # protocol: http
#   metrics:
#     # endpoint: http://otel-collector:4318/v1/metrics
#     # protocol: http

# -----------------------------------------------------------------------------
# security — authn (JWT) + authz (policies). Required unless ``dev_mode: true``
# is set at the root of this file.
#
# Order: authn (jwt) first, then authz (policies). Policies are declared
# inline here — no separate access.yml file. See docs/access-policy.md.
# -----------------------------------------------------------------------------
# security:
#   # JWT verification — required when dev_mode is false.
#   jwt:
#     algorithms: [RS256]            # required when enabled. Allow-list pinned.
#     audience: dbt-graphql          # optional, str | list[str]
#     issuer: https://issuer.example/
#     leeway: 30                     # seconds; clock-skew tolerance for exp/nbf
#     required_claims: [exp]         # forced-essential claims
#     roles_claim: scope             # claim read for Starlette scopes
#     # exactly one key source:
#     jwks_url: https://issuer.example/.well-known/jwks.json
#     jwks_cache_ttl: 3600           # only meaningful with jwks_url
#     # key_url: https://internal/keys/dbt-graphql.pem
#     # key_env: JWT_SECRET          # name of env var (NOT the secret)
#     # key_file: /etc/dbt-graphql/jwt.pem
#
#   # Access policies - Each entry's `when` is a simpleeval expression
#   # against `jwt`; `tables` declares per-table column/row rules. Multiple
#   # matching entries merge OR-style (most-permissive wins for columns/rows;
#   # masks must agree across matching policies). Default-deny: any table
#   # not listed under a matching allow rule raises FORBIDDEN_TABLE.
#   #
#   # `effect` (REQUIRED, no default — XACML / AWS IAM convention):
#   #   allow - additive grant. `tables[*]` uses column_level and/or row_filter.
#   #   deny  - subtractive prohibition; precedence over every allow.
#   #           `tables[*]` uses deny_all and/or deny_columns.
#   #
#   # Evaluation:
#   #   1. Allows merge into a single ResolvedPolicy (union of columns, OR
#   #      of row filters, agreement-only masks).
#   #   2. Any matching deny with `deny_all: true` short-circuits to
#   #      FORBIDDEN_TABLE — even if an allow would have granted access.
#   #   3. `deny_columns` from every matching deny are subtracted from the
#   #      allowed set and added to blocked_columns; the strict-column check
#   #      then rejects queries that select them.
#   #
#   # `when` operators: and, or, not, in, not in, ==, !=, >=, <=, >, <
#   # jwt fields: jwt.sub, jwt.email, jwt.groups (list), jwt.claims.<key>
#   #
#   # column_level (allow-effect only):
#   #   include_all (bool)  - allow all columns; mutually exclusive with includes
#   #   includes (list)     - explicit column allow-list
#   #   excludes (list)     - columns to strip from results
#   #   mask (dict)         - col: "SQL expression" referencing the column directly;
#   #                         use ~ (YAML null) to emit SQL NULL
#   #
#   # row_filter (allow-effect only) - structured boolean DSL.
#   #   Logical ops: _and, _or, _not.
#   #   Comparison: _eq, _ne, _lt, _lte, _gt, _gte, _in, _is_null.
#   #   RHS values are literals or { jwt: "<dotted.path>" } references.
#   #
#   # deny_all (deny-effect only)     - bool; deny the whole table.
#   # deny_columns (deny-effect only) - list[str]; deny named columns.
#   policies:
#     # Full access — data admins see everything with no row restrictions.
#     # Table wildcards aren't supported; list each table explicitly.
#     - name: admin
#       effect: allow
#       when: "'data-admins' in jwt.groups"
#       tables:
#         orders:
#           column_level: { include_all: true }
#         customers:
#           column_level: { include_all: true }
#         products:
#           column_level: { include_all: true }
#
#     # Analysts see their org's data; PII columns are masked.
#     - name: analyst
#       effect: allow
#       when: "'analysts' in jwt.groups"
#       tables:
#         orders:
#           column_level:
#             include_all: true
#             excludes: [internal_notes]
#           row_filter:
#             org_id: { _eq: { jwt: claims.org_id } }
#         customers:
#           column_level:
#             include_all: true
#             excludes: [raw_source_id]
#             mask:
#               email: "CONCAT('***@', SPLIT_PART(email, '@', 2))"
#               phone: "CONCAT('***-***-', RIGHT(phone, 4))"
#               ssn: ~
#           row_filter:
#             _and:
#               - org_id: { _eq: { jwt: claims.org_id } }
#               - status: { _in: [active, pending] }
#
#     # Finance team — row-restricted to their region; level gate.
#     - name: finance
#       effect: allow
#       when: "'finance' in jwt.groups and jwt.claims.level >= 3"
#       tables:
#         orders:
#           column_level: { include_all: true }
#           row_filter:
#             region: { _eq: { jwt: claims.region } }
#
#     # Unauthenticated users see only the public product catalogue.
#     - name: anon
#       effect: allow
#       when: "jwt.sub == None"
#       tables:
#         products:
#           column_level:
#             includes: [product_id, name, category, price]
#           row_filter:
#             published: { _eq: true }
#
#     # Cross-cutting deny: contractors never see PII on customers, regardless
#     # of which other groups they're in. Deny precedence > any allow.
#     - name: contractors_no_pii
#       effect: deny
#       when: "'contractors' in jwt.groups"
#       tables:
#         customers:
#           deny_columns: [email, phone, ssn]
#         orders:
#           deny_all: true                    # contractors can't read orders at all

# -----------------------------------------------------------------------------
# cache (optional) — result cache + singleflight between HTTP and the warehouse.
# Keyed by the rendered SQL + bound parameter values, so cross-tenant isolation
# is structural (different row-filter values produce different keys). See
# docs/caching.md for the key-derivation argument.
# -----------------------------------------------------------------------------
# cache:
#   url: "mem://?size=10000"           # default — in-memory LRU
#   # url: "redis://localhost:6379/0"  # multi-replica: shares cache + locks across pods
#   ttl: 60                            # freshness window in seconds; 0 = realtime
#   lock_safety_timeout: 60            # singleflight lock auto-release (seconds)
