services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: jaffle
      POSTGRES_PASSWORD: jaffle
      POSTGRES_DB: jaffle_shop
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jaffle"]
      interval: 1s
      retries: 15

  mysql:
    image: mysql:9
    environment:
      MYSQL_ROOT_PASSWORD: jaffle
      MYSQL_DATABASE: jaffle_shop
      MYSQL_USER: jaffle
      MYSQL_PASSWORD: jaffle
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 1s
      retries: 15
