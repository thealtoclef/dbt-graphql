# Access Policy Example
# ---------------------
# Place this file at access.yml and reference it from config.yml:
#
#   security:
#     policy_path: access.yml
#
# Top-level key: `policies` (list). Each entry:
#   name   - human-readable label (used in logs)
#   when   - expression evaluated by simpleeval against `jwt`
#   tables - per-table column_level and row_level rules
#
# `when` operators: and, or, not, in, not in, ==, !=, >=, <=, >, <
# jwt fields: jwt.sub, jwt.email, jwt.groups (list), jwt.claims.<key>
#
# column_level:
#   include_all (bool)  - allow all columns; mutually exclusive with includes
#   includes (list)     - explicit column allow-list
#   excludes (list)     - columns to strip from results
#   mask (dict)         - col: "SQL expression" referencing the column directly
#                         write "NULL" to emit SQL NULL
#
# row_level (string)    - SQL template. Placeholders `{{ jwt.X }}` are
#                         rendered as SQL bind parameters — DO NOT quote them.
#                         Example (correct):   user_id = {{ jwt.sub }}
#                         Example (wrong):     user_id = '{{ jwt.sub }}'
#
# Multi-policy match: OR semantics (most permissive wins for columns/rows;
# masks apply only when every matching policy agrees on the expression).

policies:
  # Full access — data admins see everything with no row restrictions.
  # Table wildcards aren't supported; list each table explicitly.
  - name: admin
    when: "'data-admins' in jwt.groups"
    tables:
      orders:
        column_level:
          include_all: true
      customers:
        column_level:
          include_all: true
      products:
        column_level:
          include_all: true

  # Analysts see their org's data; PII columns are masked.
  - name: analyst
    when: "'analysts' in jwt.groups"
    tables:
      orders:
        column_level:
          include_all: true
          excludes: [internal_notes]
        row_level: "org_id = {{ jwt.claims.org_id }}"

      customers:
        column_level:
          include_all: true
          excludes: [raw_source_id]
          mask:
            email: "CONCAT('***@', SPLIT_PART(email, '@', 2))"
            phone: "CONCAT('***-***-', RIGHT(phone, 4))"
            ssn: ~
        row_level: "org_id = {{ jwt.claims.org_id }}"

  # Finance team sees salary and revenue; row-restricted to their region.
  - name: finance
    when: "'finance' in jwt.groups and jwt.claims.level >= 3"
    tables:
      orders:
        column_level:
          include_all: true
        row_level: "region = {{ jwt.claims.region }}"

  # Unauthenticated users see only the public product catalogue.
  - name: anon
    when: "jwt.sub == None"
    tables:
      products:
        column_level:
          includes: [product_id, name, category, price]
        row_level: "published = TRUE"
